name: Temporary sector fund-flow fetch

on:
  pull_request:
    branches: [master]
    paths:
      - 'tmp/chatgpt-sector-flow-trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: industrial-metals
            name: 工业金属
            code: BK1287
          - key: consumer-electronics
            name: 消费电子
            code: BK1037
          - key: solar-equipment
            name: 光伏设备
            code: BK1031
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q selenium
      - name: Fetch one Eastmoney sector history in Chrome
        run: |
          python - <<'PY'
          import json, time, urllib.parse
          from pathlib import Path
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options

          name='${{ matrix.name }}'; code='${{ matrix.code }}'; key='${{ matrix.key }}'
          page_url=f'https://data.eastmoney.com/bkzj/{code}.html'
          base='https://push2his.eastmoney.com/api/qt/stock/fflow/daykline/get'
          params={'lmt':'0','klt':'101','fields1':'f1,f2,f3,f7',
                  'fields2':'f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63,f64,f65',
                  'ut':'b2884a393a59ad64002292a3e90d46a5','secid':'90.'+code,'_':str(int(time.time()*1000))}
          api_url=base+'?'+urllib.parse.urlencode(params)
          out={'fetched_at_utc':time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),'name':name,'code':code,'rows':[],'diagnostics':[]}
          opts=Options(); opts.add_argument('--headless=new'); opts.add_argument('--no-sandbox'); opts.add_argument('--disable-dev-shm-usage')
          opts.add_argument('--disable-gpu'); opts.add_argument('--window-size=1280,900'); opts.add_argument('--lang=zh-CN')
          opts.add_argument('--user-agent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36')
          driver=None
          try:
              driver=webdriver.Chrome(options=opts); driver.set_page_load_timeout(45); driver.get(page_url); time.sleep(5)
              script='''
              const url=arguments[0], done=arguments[arguments.length-1];
              fetch(url,{credentials:'include',headers:{'Accept':'application/json,text/plain,*/*'}})
                .then(async r=>done(JSON.stringify({ok:r.ok,status:r.status,text:await r.text()})))
                .catch(e=>done(JSON.stringify({ok:false,status:0,error:String(e)})));
              '''
              driver.set_script_timeout(50); raw=driver.execute_async_script(script,api_url); res=json.loads(raw)
              out['diagnostics'].append({'page_title':driver.title,'current_url':driver.current_url,'result':{k:(v[:400] if k=='text' and isinstance(v,str) else v) for k,v in res.items()}})
              if not res.get('ok'): raise RuntimeError(res)
              payload=json.loads(res['text']); klines=((payload.get('data') or {}).get('klines') or [])
              if not klines: raise RuntimeError('empty klines')
              for line in klines:
                  p=line.split(',')
                  if len(p)>=13:
                      out['rows'].append({'date':p[0],'main_net_yuan':float(p[1]),'small_net_yuan':float(p[2]),
                        'medium_net_yuan':float(p[3]),'large_net_yuan':float(p[4]),'super_large_net_yuan':float(p[5]),
                        'main_ratio_pct':float(p[6]),'small_ratio_pct':float(p[7]),'medium_ratio_pct':float(p[8]),
                        'large_ratio_pct':float(p[9]),'super_large_ratio_pct':float(p[10]),'close':float(p[11]),
                        'change_pct':float(p[12])})
          except Exception as e:
              out['error']=repr(e)
          finally:
              if driver:
                  try: driver.quit()
                  except Exception: pass
          Path('tmp').mkdir(exist_ok=True)
          Path(f'tmp/sector_{key}.json').write_text(json.dumps(out,ensure_ascii=False,indent=2),encoding='utf-8')
          print(name,code,len(out['rows']),out.get('error'),out['diagnostics'])
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sector-flow-${{ matrix.key }}
          path: tmp/sector_${{ matrix.key }}.json
          retention-days: 1
