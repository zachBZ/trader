name: Temporary sector fund-flow fetch

on:
  pull_request:
    branches: [master]
    paths:
      - 'tmp/chatgpt-sector-flow-trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Eastmoney sector fund-flow history
        run: |
          python - <<'PY'
          import json, urllib.parse, urllib.request, time
          from pathlib import Path

          sectors = {
              '半导体': 'BK1036',
              '通信设备': 'BK0448',
              '自动化设备': 'BK1237',
              '化学制药': 'BK0465',
              '证券Ⅱ': 'BK0473',
              '工业金属': 'BK1287',
              '消费电子': 'BK1037',
              '光伏设备': 'BK1031',
          }
          base = 'https://push2his.eastmoney.com/api/qt/stock/fflow/daykline/get'
          params_base = {
              'lmt': '0', 'klt': '101',
              'fields1': 'f1,f2,f3,f7',
              'fields2': 'f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63,f64,f65',
              'ut': 'b2884a393a59ad64002292a3e90d46a5',
          }
          out = {'fetched_at_utc': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()), 'sectors': {}}
          for name, code in sectors.items():
              params = dict(params_base)
              params['secid'] = '90.' + code
              url = base + '?' + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0',
                  'Referer': f'https://data.eastmoney.com/bkzj/{code}.html',
                  'Accept': 'application/json,text/plain,*/*',
              })
              last_err = None
              for attempt in range(3):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          payload = json.loads(r.read().decode('utf-8'))
                      break
                  except Exception as e:
                      last_err = repr(e)
                      time.sleep(2 * (attempt + 1))
              else:
                  raise RuntimeError(f'{name} {code}: {last_err}')
              data = payload.get('data') or {}
              klines = data.get('klines') or []
              rows = []
              for line in klines:
                  p = line.split(',')
                  if len(p) < 13:
                      continue
                  rows.append({
                      'date': p[0],
                      'main_net_yuan': float(p[1]),
                      'small_net_yuan': float(p[2]),
                      'medium_net_yuan': float(p[3]),
                      'large_net_yuan': float(p[4]),
                      'super_large_net_yuan': float(p[5]),
                      'main_ratio_pct': float(p[6]),
                      'small_ratio_pct': float(p[7]),
                      'medium_ratio_pct': float(p[8]),
                      'large_ratio_pct': float(p[9]),
                      'super_large_ratio_pct': float(p[10]),
                      'close': float(p[11]),
                      'change_pct': float(p[12]),
                  })
              out['sectors'][name] = {'code': code, 'rows': rows}
              print(name, code, len(rows), rows[-1]['date'] if rows else None)
          Path('tmp').mkdir(exist_ok=True)
          Path('tmp/sector_flow_20260630.json').write_text(json.dumps(out, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: sector-flow-data
          path: tmp/sector_flow_20260630.json
          retention-days: 1
