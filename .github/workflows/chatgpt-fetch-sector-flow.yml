name: Temporary sector fund-flow fetch

on:
  pull_request:
    branches: [master]
    paths:
      - 'tmp/chatgpt-sector-flow-trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: industrial-metals
            name: 工业金属
            code: BK1287
          - key: consumer-electronics
            name: 消费电子
            code: BK1037
          - key: solar-equipment
            name: 光伏设备
            code: BK1031
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q selenium
      - name: Capture Eastmoney history response from page network
        run: |
          python - <<'PY'
          import json, time
          from pathlib import Path
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options

          name='${{ matrix.name }}'; code='${{ matrix.code }}'; key='${{ matrix.key }}'
          page_url=f'https://data.eastmoney.com/bkzj/{code}.html'
          out={'fetched_at_utc':time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),'name':name,'code':code,'rows':[],'diagnostics':[]}
          opts=Options(); opts.add_argument('--headless=new'); opts.add_argument('--no-sandbox'); opts.add_argument('--disable-dev-shm-usage')
          opts.add_argument('--disable-gpu'); opts.add_argument('--window-size=1440,1000'); opts.add_argument('--lang=zh-CN')
          opts.add_argument('--user-agent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36')
          opts.set_capability('goog:loggingPrefs', {'performance':'ALL'})
          driver=None
          try:
              driver=webdriver.Chrome(options=opts); driver.set_page_load_timeout(50)
              driver.execute_cdp_cmd('Network.enable', {})
              driver.get(page_url); time.sleep(12)
              entries=driver.get_log('performance'); matches=[]; seen=[]; payload=None
              for entry in entries:
                  try: msg=json.loads(entry['message'])['message']
                  except Exception: continue
                  if msg.get('method')!='Network.responseReceived': continue
                  params=msg.get('params',{}); resp=params.get('response',{}); url=resp.get('url','')
                  if 'fflow' in url: seen.append({'url':url,'status':resp.get('status'),'mime':resp.get('mimeType')})
                  if 'push2his.eastmoney.com/api/qt/stock/fflow/daykline/get' in url:
                      rid=params.get('requestId')
                      try:
                          body=driver.execute_cdp_cmd('Network.getResponseBody', {'requestId':rid}).get('body','')
                          obj=json.loads(body)
                          if (obj.get('data') or {}).get('klines'):
                              payload=obj; matches.append({'url':url,'status':resp.get('status'),'body_head':body[:180]}); break
                      except Exception as e:
                          matches.append({'url':url,'status':resp.get('status'),'body_error':repr(e)})
              out['diagnostics']={'page_title':driver.title,'current_url':driver.current_url,'fflow_responses':seen[-20:],'matches':matches}
              if payload is None: raise RuntimeError('no daykline response captured')
              klines=payload['data']['klines']
              for line in klines:
                  p=line.split(',')
                  if len(p)>=13:
                      out['rows'].append({'date':p[0],'main_net_yuan':float(p[1]),'small_net_yuan':float(p[2]),
                        'medium_net_yuan':float(p[3]),'large_net_yuan':float(p[4]),'super_large_net_yuan':float(p[5]),
                        'main_ratio_pct':float(p[6]),'small_ratio_pct':float(p[7]),'medium_ratio_pct':float(p[8]),
                        'large_ratio_pct':float(p[9]),'super_large_ratio_pct':float(p[10]),'close':float(p[11]),
                        'change_pct':float(p[12])})
          except Exception as e:
              out['error']=repr(e)
          finally:
              if driver:
                  try: driver.quit()
                  except Exception: pass
          Path('tmp').mkdir(exist_ok=True)
          Path(f'tmp/sector_{key}.json').write_text(json.dumps(out,ensure_ascii=False,indent=2),encoding='utf-8')
          print(name,code,len(out['rows']),out.get('error'),json.dumps(out.get('diagnostics'),ensure_ascii=False)[:2000])
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sector-flow-${{ matrix.key }}
          path: tmp/sector_${{ matrix.key }}.json
          retention-days: 1
