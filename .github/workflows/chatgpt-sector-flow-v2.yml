name: Temporary five-sector fund-flow fetch

on:
  pull_request:
    branches: [master]
    paths:
      - 'tmp/chatgpt-five-sector-trigger.txt'

permissions:
  contents: read

jobs:
  fetch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: innovation-drug
            label: 创新药
            secid: 90.BK1106
            code: BK1106
            resolved: 创新药概念
          - key: robot
            label: 机器人
            secid: 90.BK1408
            code: BK1408
            resolved: 机器人行业
          - key: semiconductor
            label: 半导体
            secid: 90.BK1036
            code: BK1036
            resolved: 半导体行业
          - key: communication
            label: 通信
            secid: 90.BK0448
            code: BK0448
            resolved: 通信设备行业
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q requests
      - name: Fetch corrected history
        run: |
          python - <<'PY'
          import json, time
          from pathlib import Path
          import requests

          label='${{ matrix.label }}'; secid='${{ matrix.secid }}'; code='${{ matrix.code }}'; key='${{ matrix.key }}'; resolved='${{ matrix.resolved }}'
          headers={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36',
                   'Accept':'application/json,text/plain,*/*','Accept-Language':'zh-CN,zh;q=0.9','Connection':'close',
                   'Referer':f'https://data.eastmoney.com/bkzj/{code}.html'}
          out={'label':label,'resolved_name':resolved,'code':code,'secid':secid,'rows':[],'diagnostics':[]}
          url='https://push2his.eastmoney.com/api/qt/stock/fflow/daykline/get'
          params={'lmt':'0','klt':'101','fields1':'f1,f2,f3,f7',
                  'fields2':'f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63,f64,f65',
                  'ut':'b2884a393a59ad64002292a3e90d46a5','secid':secid,'_':str(int(time.time()*1000))}
          last=None
          for attempt in range(5):
              try:
                  with requests.Session() as s:
                      r=s.get(url,params=params,headers=headers,timeout=45)
                  out['diagnostics'].append({'attempt':attempt+1,'status':r.status_code,'head':r.text[:300]})
                  r.raise_for_status(); payload=r.json(); klines=((payload.get('data') or {}).get('klines') or [])
                  if not klines: raise RuntimeError('empty klines')
                  for line in klines:
                      p=line.split(',')
                      if len(p)>=13:
                          out['rows'].append({'date':p[0],'main_net_yuan':float(p[1]),'small_net_yuan':float(p[2]),
                            'medium_net_yuan':float(p[3]),'large_net_yuan':float(p[4]),'super_large_net_yuan':float(p[5]),
                            'main_ratio_pct':float(p[6]),'small_ratio_pct':float(p[7]),'medium_ratio_pct':float(p[8]),
                            'large_ratio_pct':float(p[9]),'super_large_ratio_pct':float(p[10]),'close':float(p[11]),
                            'change_pct':float(p[12])})
                  last=None; break
              except Exception as e:
                  last=repr(e); time.sleep(7*(attempt+1))
          if last: out['error']=last
          Path('tmp').mkdir(exist_ok=True)
          Path(f'tmp/five_sector_corrected_{key}.json').write_text(json.dumps(out,ensure_ascii=False,indent=2),encoding='utf-8')
          print(label,code,len(out['rows']),out.get('error'),out['diagnostics'])
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: five-sector-corrected-${{ matrix.key }}
          path: tmp/five_sector_corrected_${{ matrix.key }}.json
          retention-days: 1
