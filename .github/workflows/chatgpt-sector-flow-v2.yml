name: Temporary five-sector fund-flow fetch

on:
  pull_request:
    branches: [master]
    paths:
      - 'tmp/chatgpt-five-sector-trigger.txt'

permissions:
  contents: read

jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q requests
      - name: Lookup exact board codes
        run: |
          python - <<'PY'
          import json, time
          from pathlib import Path
          import requests

          headers={'User-Agent':'Mozilla/5.0','Accept':'application/json,text/plain,*/*','Connection':'close'}
          out={'concept':[],'industry':[],'diagnostics':[]}
          for label,fs in [('concept','m:90+t:3'),('industry','m:90+t:2')]:
              last=None
              for host in ['82.push2.eastmoney.com','push2.eastmoney.com','20.push2.eastmoney.com','40.push2.eastmoney.com']:
                  try:
                      url=f'https://{host}/api/qt/clist/get'
                      params={'pn':1,'pz':1000,'po':1,'np':1,'fltt':2,'invt':2,'fid':'f62','fs':fs,
                              'fields':'f12,f14','ut':'b2884a393a59ad64002292a3e90d46a5','_':str(int(time.time()*1000))}
                      r=requests.get(url,params=params,headers=headers,timeout=35)
                      out['diagnostics'].append({'label':label,'host':host,'status':r.status_code,'head':r.text[:200]})
                      r.raise_for_status(); diff=((r.json().get('data') or {}).get('diff') or [])
                      if not diff: raise RuntimeError('empty diff')
                      out[label]=[{'code':x.get('f12'),'name':x.get('f14')} for x in diff if any(k in str(x.get('f14','')) for k in ['机器人','创新药','半导体','通信','红利'])]
                      last=None; break
                  except Exception as e:
                      last=repr(e); time.sleep(3)
              if last: out[label+'_error']=last
          Path('tmp').mkdir(exist_ok=True)
          Path('tmp/five_sector_lookup.json').write_text(json.dumps(out,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(out,ensure_ascii=False,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: five-sector-lookup
          path: tmp/five_sector_lookup.json
          retention-days: 1
